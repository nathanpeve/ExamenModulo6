<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Gestión de Portafolios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <img src="img/BlackRock-logo.jpg" width="180">
                        <h4 class="mt-3">Gestión de Portafolios</h4>
                        <!-- error alert -->
                        <div id="mensajeError" class="alert alert-danger mt-3 d-none">
                            Usuario o contraseña incorrectos
                        </div>
                        <div class="mb-3">
                            <input id="usuario" class="form-control" placeholder="Usuario">
                        </div>
                        <div class="mb-3">
                            <input id="clave" type="password" class="form-control" placeholder="Clave">
                        </div>
                        <button class="btn btn-primary w-100" onclick="login()">Ingresar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="/js/login.js"></script>
</body>
</html>
