<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ingreso Compra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/principal.html">
                Gestión de Portafolios
            </a>
            <div class="d-flex align-items-center text-white">
                <i class="bi bi-person-circle me-2"></i>
                <span id="nombre_usuario"></span>
                <button class="btn btn-outline-light ms-3" onclick="logout()">Salir</button>
            </div>
        </div>
    </nav>
    <h3>Ingreso de Compra</h3>

    <!-- ENCABEZADO -->
    <div class="row mb-3">
        <div class="col">
            <label>Fondo</label>
            <select id="fondo" class="form-control"></select>
        </div>

        <div class="col">
            <label>Fecha</label>
            <input type="date" id="fecha" class="form-control">
        </div>
    </div>

    <hr>

    <h5>Detalle</h5>

    <div class="row mb-2">
        <div class="col">
            <input id="nemo" class="form-control" placeholder="Nemotécnico" onblur="validarNemo()">
        </div>
        <div class="col">
            <input id="cantidad" type="number" step="0.0001" class="form-control" placeholder="Cantidad">
        </div>
        <div class="col">
            <input id="precio" type="number" step="0.0001" class="form-control" placeholder="Precio">
        </div>
        <div class="col">
            <button class="btn btn-success w-100" onclick="agregarDetalle()">Agregar</button>
        </div>
    </div>

    <table class="table table-bordered">
        <thead class="table-light">
            <tr>
                <th>Nemotécnico</th>
                <th>Cantidad</th>
                <th>Precio</th>
                <th>Total</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tablaDetalle"></tbody>
    </table>

    <div class="text-end mb-3">
        <strong>Total: $ <span id="total">0.00</span></strong>
    </div>

    <button class="btn btn-primary" onclick="guardar()">Guardar Compra</button>

    <script>
        let detalles = [];

        // ==========================
        // CARGAR FONDOS
        // ==========================
        async function cargarFondos() {
            const res = await fetch("/api/fondos");
            const data = await res.json();

            const select = document.getElementById("fondo");
            select.innerHTML = `<option value="">Seleccione</option>`;

            data.forEach(f => {
                select.innerHTML += `<option value="${f.id_fondo}">${f.nombre}</option>`;
            });
        }

        // ==========================
        // VALIDAR NEMO
        // ==========================
        async function validarNemo() {
            const nemo = document.getElementById("nemo").value.trim();

            if (!nemo) return;

            try {
                const res = await fetch(`/api/nemotecnicos/${nemo}`);

                if (!res.ok) {
                    alert("Nemotécnico no existe");
                    document.getElementById("nemo").value = "";
                    document.getElementById("nemo").focus();
                }
            } catch (err) {
                alert("Error validando nemotécnico");
            }
        }

        // ==========================
        // AGREGAR DETALLE
        // ==========================
        function agregarDetalle() {
            const nemo = document.getElementById("nemo").value.trim();
            const cantidad = parseFloat(document.getElementById("cantidad").value);
            const precio = parseFloat(document.getElementById("precio").value);

            if (!nemo) return alert("Ingrese nemotécnico");
            if (!cantidad || cantidad <= 0) return alert("Cantidad inválida");
            if (!precio || precio <= 0) return alert("Precio inválido");

            const existe = detalles.find(d => d.id_nemotecnico === nemo);
            if (existe) return alert("Ese nemotécnico ya fue agregado");

            detalles.push({ id_nemotecnico: nemo, cantidad, precio });

            renderTabla();

            document.getElementById("nemo").value = "";
            document.getElementById("cantidad").value = "";
            document.getElementById("precio").value = "";
        }

        // ==========================
        // RENDER TABLA
        // ==========================
        function renderTabla() {
            const tabla = document.getElementById("tablaDetalle");
            tabla.innerHTML = "";

            let total = 0;

            detalles.forEach((d, index) => {
                const subtotal = d.cantidad * d.precio;
                total += subtotal;

                tabla.innerHTML += `
      <tr>
        <td>${d.id_nemotecnico}</td>
        <td>${d.cantidad}</td>
        <td>${d.precio}</td>
        <td>${subtotal.toFixed(2)}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="eliminar(${index})">X</button>
        </td>
      </tr>
    `;
            });

            document.getElementById("total").innerText = total.toFixed(2);
        }

        // ==========================
        // ELIMINAR DETALLE
        // ==========================
        function eliminar(index) {
            detalles.splice(index, 1);
            renderTabla();
        }

        // ==========================
        // GUARDAR COMPRA
        // ==========================
        async function guardar() {
            const fondo = document.getElementById("fondo").value;
            const fecha = document.getElementById("fecha").value;

            if (!fondo) return alert("Seleccione fondo");
            if (!fecha) return alert("Seleccione fecha");
            if (detalles.length === 0) return alert("Debe ingresar al menos un detalle");

            try {
                const res = await fetch("/api/operaciones/compra", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        id_fondo: fondo,
                        fecha,
                        detalles
                    })
                });

                const data = await res.json();

                alert("Compra guardada ID: " + data.id_operacion);

                detalles = [];
                renderTabla();

            } catch (err) {
                alert("Error al guardar");
            }
        }

        // ==========================
        cargarFondos();
    </script>

</body>

</html>
