<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Consulta Operaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/principal.html">
                Gestión de Portafolios
            </a>
            <div class="d-flex align-items-center text-white">
                <i class="bi bi-person-circle me-2"></i>
                <span id="nombre_usuario"></span>
                <button class="btn btn-outline-light ms-3" onclick="logout()">Salir</button>
            </div>
        </div>
    </nav>

    <h3>Consulta de Operaciones</h3>

    <div class="row mb-3">
        <div class="col">
            <label>Fondo</label>
            <select id="fondo" class="form-control"></select>
        </div>

        <div class="col">
            <label>Tipo</label>
            <select id="tipo" class="form-control">
                <option value="">Todos</option>
                <option value="C">Compra</option>
                <option value="V">Venta</option>
            </select>
        </div>

        <div class="col">
            <label>Desde</label>
            <input type="date" id="desde" class="form-control">
        </div>

        <div class="col">
            <label>Hasta</label>
            <input type="date" id="hasta" class="form-control">
        </div>

        <div class="col d-flex align-items-end">
            <button class="btn btn-primary w-100" onclick="buscar()">Buscar</button>
        </div>
    </div>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Fondo</th>
                <th>Tipo</th>
                <th>Fecha</th>
                <th>Monto</th>
                <th>Nemo</th>
                <th>Cantidad</th>
                <th>Precio</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>

    <script>
        async function cargarFondos() {
            const res = await fetch("/api/fondos");
            const data = await res.json();

            const select = document.getElementById("fondo");
            select.innerHTML = `<option value="">Todos</option>`;

            data.forEach(f => {
                select.innerHTML += `<option value="${f.id_fondo}">${f.nombre}</option>`;
            });
        }

        async function buscar() {
            const fondo = document.getElementById("fondo").value;
            const tipo = document.getElementById("tipo").value;
            const desde = document.getElementById("desde").value;
            const hasta = document.getElementById("hasta").value;

            const params = new URLSearchParams({
                id_fondo: fondo,
                tipo,
                fecha_desde: desde,
                fecha_hasta: hasta
            });

            const res = await fetch(`/api/operaciones?${params}`);
            const data = await res.json();

            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";

            data.forEach(o => {
                tabla.innerHTML += `
      <tr>
        <td>${o.id_operacion}</td>
        <td>${o.fondo_nombre}</td>
        <td>${o.tipo}</td>
        <td>${o.fecha}</td>
        <td>${o.monto}</td>
        <td>${o.id_nemotecnico || ""}</td>
        <td>${o.cantidad || ""}</td>
        <td>${o.precio || ""}</td>
      </tr>
    `;
            });
        }

        cargarFondos();
    </script>

</body>

</html>
